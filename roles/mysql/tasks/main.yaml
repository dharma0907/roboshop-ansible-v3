  - name: install mysql server
    package:
     name: mysql-server
     state: present
  # - name: Install mysql
  #   command: dnf install mysql-server -y

  - name: install boto3 botocore
    pip:
     name:
     - boto3
     - botocore
     executable: pip3.9

  - name: start the service
    service:
     name: mysqld
     state: started
     enabled: true

  - name: setup root password
    command: mysql_secure_installation --set-root-pass "{{ mysql_root_password }}"
    