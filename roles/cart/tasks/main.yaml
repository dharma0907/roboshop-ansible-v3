  - name: enable node:20
    command: dnf module enable nodejs:20 -y

  - name: Install Node
    package:
     name: nodejs
     state: present

  - name: create roboshop system user
    ansible.builtin.user:
      name: roboshop
      system: true
      home: /app
      shell: /bin/nologin
      comment: "roboshop system user"

  - name: Delete a directory
    ansible.builtin.file:
      path:  /app 
      state: absent

  - name: delete catalogue.zip in tmp
    ansible.builtin.file:
      path: /tmp/cart.zip
      state: absent

  - name: Create a directory if doen't exists
    ansible.builtin.file:
      path: /app
      state: directory

  - name: Download catalogue
    ansible.builtin.get_url:
     url: https://roboshop-artifacts.s3.amazonaws.com/cart-v3.zip
     dest: /tmp/cart.zip

  - name: unzip catalogue
    ansible.builtin.unarchive:
     src:  /tmp/cart.zip
     dest: /app
     remote_src: true

  - name: Install dependencies
    community.general.npm:
      path: /app

  - name: copy user service
    template:
      src: cart.service.j2
      dest: /etc/systemd/system/cart.service

  - name: deamon reload
    systemd_service:
      name: cart
      daemon_reload: true    

  - name: start and enable
    service:
        name: cart
        state: restarted
        enabled: yes
